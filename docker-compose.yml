services:
  db:
    image: postgres:16-alpine
    container_name: fullstack-auth-starter-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: starter_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
